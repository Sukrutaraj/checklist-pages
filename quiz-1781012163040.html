<head>
<meta charset="UTF-8">

<style>
body{font-family:sans-serif;background:#f5f5f5;text-align:center;padding:20px;max-width:800px;margin:auto;}
.card{background:white;padding:25px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
h1{font-size:22px;margin-bottom:4px;}
#counter{font-size:14px;color:#888;margin-bottom:16px;}
#question h2{font-size:19px;margin-bottom:8px;}
#question img{max-width:100%;max-height:200px;border-radius:12px;margin:8px auto;display:block;}
.ans-btn{display:block;width:100%;padding:16px;margin-top:12px;border:none;border-radius:14px;background:#eee;font-size:17px;cursor:pointer;transition:background 0.2s,transform 0.1s;text-align:left;}
.ans-btn:active{transform:scale(0.98);}
.ans-btn.correct{background:#4CAF50;color:white;font-weight:bold;}
.ans-btn.wrong{background:#f44336;color:white;}
.ans-btn.reveal{background:#e8f5e9;color:#2e7d32;}
.feedback{margin-top:16px;font-size:20px;font-weight:bold;min-height:28px;}
.feedback.ok{color:#4CAF50;}
.feedback.fail{color:#f44336;}
.next-btn{margin-top:16px;padding:14px 32px;background:#1976D2;color:white;border:none;border-radius:50px;font-size:16px;cursor:pointer;display:none;}
.progress{height:6px;background:#eee;border-radius:3px;margin-bottom:20px;}
.progress-bar{height:6px;background:#4CAF50;border-radius:3px;transition:width 0.4s;}
.result-emoji{font-size:60px;margin:16px 0;}
</style>

let current=0;
let points=0;
let answered=false;

document.getElementById("quiz-title").textContent="Geografi";

function renderQuestion(){
  answered=false;
  document.getElementById("feedback").textContent="";
  document.getElementById("feedback").className="feedback";
  document.getElementById("next-btn").style.display="none";

  let q=questions[current];
  let pct=Math.round((current/questions.length)*100);
  document.getElementById("prog-bar").style.width=pct+"%";
  document.getElementById("counter").innerHTML="Fråga "+(current+1)+" av "+questions.length;

  let qHtml="<h2>"+q.text+"</h2>";
  if(q.imgUrl) qHtml+="<img src='"+q.imgUrl+"' alt='frågebild'>";
  document.getElementById("question").innerHTML=qHtml;

  let btns=[
    {val:"1",label:"1. "+q.answer1},
    {val:"X",label:"X. "+q.answerX},
    {val:"2",label:"2. "+q.answer2}
  ];
  let html="";
  btns.forEach(function(b){
    html+="<button class='ans-btn' id='btn-"+b.val+"' onclick='checkAnswer(""+b.val+"")'>"+b.label+"</button>";
  });
  document.getElementById("answers").innerHTML=html;
}

function checkAnswer(a){
  if(answered) return;
  answered=true;

  let q=questions[current];
  let correct=q.correct;
  let isRight=(a===correct);

  if(isRight) points++;

  // Show green/red on clicked button
  var clickedBtn=document.getElementById("btn-"+a);
  if(clickedBtn) clickedBtn.className="ans-btn "+(isRight?"correct":"wrong");

  // If wrong – reveal correct answer in green
  if(!isRight){
    var correctBtn=document.getElementById("btn-"+correct);
    if(correctBtn) correctBtn.className="ans-btn reveal";
  }

  // Feedback text
  var fb=document.getElementById("feedback");
  fb.textContent=isRight?"✅ Rätt!" :"❌ Fel!";
  fb.className="feedback "+(isRight?"ok":"fail");

  // Show next button (or finish)
  var nb=document.getElementById("next-btn");
  nb.style.display="inline-block";
  if(current>=questions.length-1) nb.textContent="Se resultat →";
}

function nextQuestion(){
  current++;
  if(current>=questions.length){
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult(){
  var pct=Math.round((points/questions.length)*100);
  var emoji=pct===100?"🏆":pct>=70?"🎉":pct>=40?"👍":"💪";
  document.querySelector(".card").innerHTML=
    "<div class='result-emoji'>"+emoji+"</div>"+
    "<h1>Klart!</h1>"+
    "<h2>"+points+" av "+questions.length+" rätt</h2>"+
    "<p style='color:#888;font-size:14px;'>"+pct+"% rätt</p>"+
    "<button onclick='location.reload()' style='margin-top:20px;padding:14px 32px;background:#1976D2;color:white;border:none;border-radius:50px;font-size:16px;cursor:pointer;'>Spela igen 🔄</button>";
}

renderQuestion();

</script>
