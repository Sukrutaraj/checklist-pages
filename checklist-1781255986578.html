<!DOCTYPE html>
<html lang='sv'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Hälso- Quiz</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;text-align:center;padding:20px;max-width:800px;margin:auto;}
.card{background:white;padding:25px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
h1{font-size:22px;margin-bottom:4px;}
#counter{font-size:14px;color:#888;margin-bottom:16px;}
#question h2{font-size:19px;margin-bottom:8px;}
#question img{max-width:100%;max-height:200px;border-radius:12px;margin:8px auto;display:block;}
.ans-btn{display:block;width:100%;padding:16px;margin-top:12px;border:none;border-radius:14px;background:#eee;font-size:17px;cursor:pointer;transition:background 0.2s;text-align:left;}
.ans-btn.correct{background:#4CAF50;color:white;font-weight:bold;}
.ans-btn.wrong{background:#f44336;color:white;}
.ans-btn.reveal{background:#e8f5e9;color:#2e7d32;font-weight:bold;}
.feedback{margin-top:16px;font-size:22px;font-weight:bold;min-height:28px;}
.feedback.ok{color:#4CAF50;}
.feedback.fail{color:#f44336;}
.next-btn{margin-top:16px;padding:14px 32px;background:#1976D2;color:white;border:none;border-radius:50px;font-size:16px;cursor:pointer;display:none;}
.progress{height:6px;background:#eee;border-radius:3px;margin-bottom:20px;}
.progress-bar{height:6px;background:#4CAF50;border-radius:3px;transition:width 0.4s;}
.result-emoji{font-size:60px;margin:16px 0;}
</style>
</head>
<body>
<div class='card'>
<h1 id='quiz-title'></h1>
<div class='progress'><div class='progress-bar' id='prog-bar' style='width:0%'></div></div>
<div id='counter'></div>
<div id='question'></div>
<div id='answers'></div>
<div class='feedback' id='feedback'></div>
<button class='next-btn' id='next-btn' onclick='nextQuestion()'>Nästa fråga →</button>
</div>
<script>

var questions = [{"text":"Hur stor del av sitt liv beräknas en genomsnittlig människa spendera sovande?","answer1":"Ungefär en fjärdedel 1/4","answerX":"Ungefär en tredjedel 1/3","answer2":"Ungefär hälften 1/2","correct":"X","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-img-0.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-audio-0.wav"},{"text":"Enligt Folkhälsomyndigheten rekommenderas minst 150–300 minuters fysisk aktivitet i veckan. Hur lång tid blir det per dag?","answer1":"Cirka 10–20 minuter per dag","answerX":"Cirka 20–40 minuter per dag","answer2":"Cirka 45–60 minuter per dag","correct":"X","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-img-1.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-audio-1.wav"},{"text":"Vilken vitamin brukar kallas för \"Solvitamin\" eftersom det bildas i huden när vi vistas ute i solskenet?","answer1":"A-vitamin","answerX":"C-vitamin","answer2":"D-vitamin","correct":"2","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-img-2.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-audio-2.wav"},{"text":"Forskning visar att sociala relationer är direkt hälsofrämjande. Vad är det viktigaste för vårt psykiska välmående enligt psykologer och forskare?","answer1":"Att ha över 500 följare på Sociala medier","answerX":"Att ha fåtal nära och djupa relationer","answer2":"Att aldrig känna stress","correct":"X","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-img-3.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-audio-3.wav"},{"text":"Kroppen består till stor del av vatten. Ungefär hur stor andel av en vuxen människas kroppsvikt utgörs av vatten?","answer1":"20%","answerX":"85%","answer2":"55-65%","correct":"2","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-img-4.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-audio-4.wav"},{"text":"Vilken typ av träning är särskilt effektiv för att bygga upp och bibehålla en stark benstomme samt motverka benskörhet?","answer1":"lugn stretching","answerX":"Tyngd lyftning/Styrketräning","answer2":"Lång distans simning","correct":"X","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-img-5.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-audio-5.wav"},{"text":"När vi blir stressade tenderar vi att andas snabbt och ytligt. Vilken typ av andning lugnar oss snabbaste?","answer1":" Djup bukandning (att andas med magen)","answerX":"Snabb bröstkorgsandning","answer2":"Att hålla andan i korta intervaller","correct":"1","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-img-6.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-audio-6.wav"},{"text":"Många är mycket vid datorskärm eller mobil varje dag. Vad rekommenderas för att ge ögonen vila?","answer1":"10-10-10-regeln (titta på 10 meters håll i 10 sekunder var 10:e minut)","answerX":"60-60-60-regeln (blunda i 60 sekunder var 60:e minut)","answer2":"20-20-20-regeln (titta på 20 fots/6 meters håll i 20 sekunder var 20:e minut)","correct":"2","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-img-7.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-audio-7.wav"},{"text":"Det blå ljuset från mobilskärmar kan störa vår nattsömn om vi tittar på dem precis innan vi ska sova. Vilket hormon störs av detta ljus?","answer1":"Melatonin (sömnbetingat hormon)","answerX":"Adrenalin (stresshormon)","answer2":"Serotonin (Glädjehormon)","correct":"1","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-img-8.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-audio-8.wav"},{"text":"Att vara ute i naturen har en snabb effekt på vår hälsa. Hur kort tid i naturen behövs för att sänka stress och blodtrycket?","answer1":" Det räcker med 20–30 minuter","answerX":"Det krävs minst 2 timmar i sträck","answer2":"Det har ingen effekt alls på så kort tid","correct":"1","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-img-9.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1781255986578-audio-9.wav"}];
var quizTitle = "Hälso- Quiz";
var current = 0, points = 0, answered = false;
document.getElementById('quiz-title').textContent = quizTitle;

function renderQuestion(){
  answered = false;
  var fb = document.getElementById('feedback');
  fb.textContent = '';
  fb.className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
  var q = questions[current];
  var pct = Math.round((current / questions.length) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('counter').textContent = 'Fråga ' + (current + 1) + ' av ' + questions.length;
  var qHtml = '<h2>' + q.text + '</h2>';
  if(q.imgUrl){ qHtml += '<img src="' + q.imgUrl + '" alt="frågebild">'; }
  if(q.audioUrl){ qHtml += '<audio controls preload="metadata" src="' + q.audioUrl + '" style="width:100%;margin-top:10px;">Din webbläsare kan inte spela upp ljudet.</audio>'; }
  document.getElementById('question').innerHTML = qHtml;
  var btns = [
    {val:'1', label:'1. ' + q.answer1},
    {val:'X', label:'X. ' + q.answerX},
    {val:'2', label:'2. ' + q.answer2}
  ];
  var ans = document.getElementById('answers');
  ans.innerHTML = '';
  btns.forEach(function(b){
    var btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.id = 'btn-' + b.val;
    btn.textContent = b.label;
    btn.onclick = function(){ checkAnswer(b.val); };
    ans.appendChild(btn);
  });
}

function checkAnswer(a){
  if(answered) return;
  answered = true;
  var q = questions[current];
  var isRight = (a === q.correct);
  if(isRight) points++;
  var cb = document.getElementById('btn-' + a);
  if(cb) cb.className = 'ans-btn ' + (isRight ? 'correct' : 'wrong');
  if(!isRight){
    var rb = document.getElementById('btn-' + q.correct);
    if(rb) rb.className = 'ans-btn reveal';
  }
  var fb = document.getElementById('feedback');
  fb.textContent = isRight ? '✅ Rätt!' : '❌ Fel!';
  fb.className = 'feedback ' + (isRight ? 'ok' : 'fail');
  var nb = document.getElementById('next-btn');
  nb.style.display = 'inline-block';
  nb.textContent = (current >= questions.length - 1) ? 'Se resultat →' : 'Nästa fråga →';
}

function nextQuestion(){
  current++;
  if(current >= questions.length){ showResult(); }
  else { renderQuestion(); }
}

function showResult(){
  var pct = Math.round((points / questions.length) * 100);
  var emoji = pct === 100 ? '🏆' : pct >= 70 ? '🎉' : pct >= 40 ? '👍' : '💪';
  document.querySelector('.card').innerHTML =
    '<div class="result-emoji">' + emoji + '</div>' +
    '<h1>Klart!</h1>' +
    '<h2>' + points + ' av ' + questions.length + ' rätt</h2>' +
    '<p style="color:#888;font-size:14px;">' + pct + '% rätt</p>' +
    '<button class="next-btn" style="display:inline-block;background:#1976D2;" onclick="location.reload()">Spela igen 🔄</button>';
}

renderQuestion();

</script>
</body>
</html>
