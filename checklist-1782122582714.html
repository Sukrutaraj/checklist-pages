<!DOCTYPE html>
<html lang='sv'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Tipsrunda onsdag 24 Juni 2024</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;text-align:center;padding:20px;max-width:800px;margin:auto;}
.card{background:white;padding:25px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
h1{font-size:22px;margin-bottom:4px;}
#counter{font-size:14px;color:#888;margin-bottom:16px;}
#question h2{font-size:19px;margin-bottom:8px;}
#question img{max-width:100%;max-height:200px;border-radius:12px;margin:8px auto;display:block;}
.ans-btn{display:block;width:100%;padding:16px;margin-top:12px;border:none;border-radius:14px;background:#eee;font-size:17px;cursor:pointer;transition:background 0.2s;text-align:left;}
.ans-btn.correct{background:#4CAF50;color:white;font-weight:bold;}
.ans-btn.wrong{background:#f44336;color:white;}
.ans-btn.reveal{background:#e8f5e9;color:#2e7d32;font-weight:bold;}
.feedback{margin-top:16px;font-size:22px;font-weight:bold;min-height:28px;}
.feedback.ok{color:#4CAF50;}
.feedback.fail{color:#f44336;}
.next-btn{margin-top:16px;padding:14px 32px;background:#1976D2;color:white;border:none;border-radius:50px;font-size:16px;cursor:pointer;display:none;}
.progress{height:6px;background:#eee;border-radius:3px;margin-bottom:20px;}
.progress-bar{height:6px;background:#4CAF50;border-radius:3px;transition:width 0.4s;}
.result-emoji{font-size:60px;margin:16px 0;}
.opt{padding:14px;margin-top:10px;border-radius:14px;background:#eee;font-size:17px;text-align:left;}
.station-note{color:#888;font-size:13px;margin-top:18px;}
</style>
</head>
<body>
<div class='card'>
<h1 id='quiz-title'></h1>
<div class='progress'><div class='progress-bar' id='prog-bar' style='width:0%'></div></div>
<div id='counter'></div>
<div id='question'></div>
<div id='answers'></div>
<div class='feedback' id='feedback'></div>
<button class='next-btn' id='next-btn' onclick='nextQuestion()'>Nästa fråga →</button>
</div>
<script>

var questions = [{"text":"Hur många hjul har en vanlig kontorsstol?","answer1":"1. 4 hjul","answerX":"X. 3 hjul","answer2":"2. 5 hjul","correct":"2","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-img-0.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-audio-0.wav"},{"text":"Hur många ränder finns det på USA:s flagga?","answer1":"1. 13","answerX":"X. 52","answer2":"2. 25","correct":"1","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-img-1.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-audio-1.wav"},{"text":"Vilket är det enda däggdjuret som kan flyga på riktigt?","answer1":"1. Flygekorre","answerX":"X. Fladdermus","answer2":"2. Kolibri","correct":"X","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-img-2.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-audio-2.wav"},{"text":"Hur många tangenter finns på ett fullstort piano?","answer1":"1. 64","answerX":"X. 76","answer2":"2. 88","correct":"2","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-img-3.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-audio-3.wav"},{"text":"Vilken frukt är det som har sina frön utanför skalet i stället för innanför?","answer1":"1. Jordgubbe","answerX":"X. Kiwi","answer2":"2.Annanas","correct":"1","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-img-4.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-audio-4.wav"},{"text":"Vad betyder egentligen ordet emoji?","answer1":"1. Ansiktsbild","answerX":"X. Elektronisk känsla","answer2":"2. Bildtecken","correct":"2","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-img-5.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-audio-5.wav"},{"text":"Vad betyder uttrycket göra en pudel?","answer1":"1. Göra en snabb undanmanöver","answerX":"X.Erkänna ett misstag och be om ursäkt","answer2":"2. Göra sig extra fin","correct":"X","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-img-6.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-audio-6.wav"},{"text":"Vilken svensk kung kallades för gråkappan?","answer1":"1 Karl XII","answerX":"X  Gustav II Adolf","answer2":"2. Karl XI","correct":"1","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-img-7.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-audio-7.wav"},{"text":"Hur många ben har hummern?","answer1":"1.  6","answerX":"X. 8","answer2":"2. 10","correct":"2","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-img-8.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-audio-8.wav"},{"text":"Vad kallas en grupp kor?","answer1":"1. Flock","answerX":"X. En hjord","answer2":"2. En skock","correct":"X","imgUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-img-9.jpg","audioUrl":"https://sukrutaraj.github.io/checklist-pages/checklist-1782122582714-audio-9.wav"}];
var quizTitle = "Tipsrunda onsdag 24 Juni 2024";
var current = 0, points = 0, answered = false;
document.getElementById('quiz-title').textContent = quizTitle;

function renderQuestion(){
  answered = false;
  var fb = document.getElementById('feedback');
  fb.textContent = '';
  fb.className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
  var q = questions[current];
  var pct = Math.round((current / questions.length) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('counter').textContent = 'Fråga ' + (current + 1) + ' av ' + questions.length;
  var qHtml = '<h2>' + q.text + '</h2>';
  if(q.imgUrl){ qHtml += '<img src="' + q.imgUrl + '" alt="frågebild">'; }
  if(q.audioUrl){ qHtml += '<audio controls preload="metadata" src="' + q.audioUrl + '" style="width:100%;margin-top:10px;">Din webbläsare kan inte spela upp ljudet.</audio>'; }
  document.getElementById('question').innerHTML = qHtml;
  var btns = [
    {val:'1', label:'1. ' + q.answer1},
    {val:'X', label:'X. ' + q.answerX},
    {val:'2', label:'2. ' + q.answer2}
  ];
  var ans = document.getElementById('answers');
  ans.innerHTML = '';
  btns.forEach(function(b){
    var btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.id = 'btn-' + b.val;
    btn.textContent = b.label;
    btn.onclick = function(){ checkAnswer(b.val); };
    ans.appendChild(btn);
  });
}

function checkAnswer(a){
  if(answered) return;
  answered = true;
  var q = questions[current];
  var isRight = (a === q.correct);
  if(isRight) points++;
  var cb = document.getElementById('btn-' + a);
  if(cb) cb.className = 'ans-btn ' + (isRight ? 'correct' : 'wrong');
  if(!isRight){
    var rb = document.getElementById('btn-' + q.correct);
    if(rb) rb.className = 'ans-btn reveal';
  }
  var fb = document.getElementById('feedback');
  fb.textContent = isRight ? '✅ Rätt!' : '❌ Fel!';
  fb.className = 'feedback ' + (isRight ? 'ok' : 'fail');
  var nb = document.getElementById('next-btn');
  nb.style.display = 'inline-block';
  nb.textContent = (current >= questions.length - 1) ? 'Se resultat →' : 'Nästa fråga →';
}

function nextQuestion(){
  current++;
  if(current >= questions.length){ showResult(); }
  else { renderQuestion(); }
}

function showResult(){
  var pct = Math.round((points / questions.length) * 100);
  var emoji = pct === 100 ? '🏆' : pct >= 70 ? '🎉' : pct >= 40 ? '👍' : '💪';
  document.querySelector('.card').innerHTML =
    '<div class="result-emoji">' + emoji + '</div>' +
    '<h1>Klart!</h1>' +
    '<h2>' + points + ' av ' + questions.length + ' rätt</h2>' +
    '<p style="color:#888;font-size:14px;">' + pct + '% rätt</p>' +
    '<button class="next-btn" style="display:inline-block;background:#1976D2;" onclick="location.reload()">Spela igen 🔄</button>';
}

// Enskild fråga (öppnas via QR-kod, t.ex. #q=3) – visar ljud + alternativ utan facit
function renderSingle(idx){
  if(isNaN(idx) || idx < 0 || idx >= questions.length){ renderQuestion(); return; }
  var q = questions[idx];
  var html = '<h1>' + quizTitle + '</h1>';
  html += '<div id="counter">Fråga ' + (idx + 1) + ' av ' + questions.length + '</div>';
  html += '<div id="question"><h2>' + q.text + '</h2>';
  if(q.imgUrl){ html += '<img src="' + q.imgUrl + '" alt="frågebild">'; }
  if(q.audioUrl){ html += '<audio controls preload="metadata" src="' + q.audioUrl + '" style="width:100%;margin-top:10px;"></audio>'; }
  html += '</div>';
  if(q.answer1) html += '<div class="opt">1. ' + q.answer1 + '</div>';
  if(q.answerX) html += '<div class="opt">X. ' + q.answerX + '</div>';
  if(q.answer2) html += '<div class="opt">2. ' + q.answer2 + '</div>';
  html += '<p class="station-note">Markera ditt svar (1, X eller 2) på din svarsmall.</p>';
  document.querySelector('.card').innerHTML = html;
}

var hashMatch = (location.hash.match(/q=(\d+)/) || [])[1];
if(hashMatch){ renderSingle(parseInt(hashMatch, 10) - 1); }
else { renderQuestion(); }

</script>
</body>
</html>
