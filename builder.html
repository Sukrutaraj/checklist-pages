<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Aktivitets-checklista</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  text-align:center;
  padding:20px;
  max-width:900px;
  margin:auto;
}

.section{
  background:white;
  padding:12px;
  margin:10px auto;
  border-radius:12px;
}

input{
  width:90%;
  padding:8px;
  margin:6px;
  border-radius:8px;
  border:1px solid #ddd;
}

.step{
  border:1px solid #eee;
  border-radius:10px;
  padding:10px;
  margin:8px 0;
}

img{
  max-height:100px;
  margin-top:6px;
  border-radius:8px;
}

.smallBtn{
  background:#eee;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin:3px;
}

.tool-row{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-top:15px;
  flex-wrap:wrap;
}

.tool-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
}

.tool-btn .icon{
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #333;
  font-size:26px;
  background:white;
}

.tool-btn .label{
  margin-top:6px;
  font-size:13px;
}

#preview{
  display:none;
  text-align:left;
}

button, .smallBtn {
  transition: all 0.1s ease;
}

button:active, .smallBtn:active {
  transform: scale(0.95);
  background:#ddd;
}

.tool-btn:active .icon {
  transform: scale(0.92);
  background:#eee;
}
</style>
</head>

<body>

<h2>Digital Aktivitets-checklista</h2>

<div class="section">
  <input id="title" placeholder="Titel på checklistan" oninput="updateData()">
</div>

<div id="steps"></div>

<button onclick="addStep()">➕ Lägg till steg</button>

<div class="tool-row">

   <div class="tool-btn" onclick="downloadHTML()">
    <div class="icon">📄</div>
    <div class="label">Ladda ner HTML</div>
  </div>

  <div class="tool-btn" onclick="exportJSON()">
    <div class="icon">⬇️</div>
    <div class="label">Ladda ner JSON</div>
  </div>

  <div class="tool-btn" onclick="importJSON()">
    <div class="icon">⬆️</div>
    <div class="label">Ladda upp JSON</div>
  </div>

  <div class="tool-btn" onclick="createLink()">
    <div class="icon">🔗</div>
    <div class="label">Skapa länk</div>
  </div>

</div>

<br>

<button onclick="generatePreview()">▶️ Generera preview</button>

<div id="preview" class="section"></div>

<script>

let checklistData = { title:"", steps:[] };

let stream = null;
let recorder = null;
let chunks = [];

  async function uploadFile(path, content, token){

  const res = await fetch(`https://api.github.com/repos/Sukrutaraj/checklist-pages/contents/${path}`, {
    method: "PUT",
    headers: {
      "Authorization": `token ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "upload file",
      content: content
    })
  });

  return await res.json();
}
  
/* ===== CLICK FEEDBACK ===== */
function clickFeedback(){
  try{
    const audio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=");
    audio.volume = 0.2;
    audio.play();
  }catch(e){}
}

document.addEventListener("click", e=>{
  if(e.target.tagName === "BUTTON" || e.target.closest(".tool-btn")){
    clickFeedback();
  }
});

/* ===== CREATE LINK ===== */
async function createLink(){

  updateData();

  const hasContent = checklistData.steps.some(s => s.text || s.img || s.audio);

  if(!checklistData.title && !hasContent){
    alert("Checklistan är tom.");
    return;
  }

  let token = localStorage.getItem("gh_token");

  if(!token){
    token = prompt("Klistra in din GitHub token:");
    if(!token) return;
    localStorage.setItem("gh_token", token);
  }

  const id = Date.now();
  const basePath = `checklist-${id}`;

  let html = `
<html>
<head>
<meta charset="UTF-8">
<title>${checklistData.title}</title>

<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#f5f5f5;
}
.step{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  gap:10px;
  align-items:center;
}
.step img{
  max-width:120px;
  border-radius:8px;
}
.completed{
  background:#e5f7e5;
  opacity:0.7;
}
.text{flex:1;}
.progress{
  text-align:center;
  font-size:18px;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>${checklistData.title}</h2>
<div id="steps">
`;

  try{

    for(let i=0;i<checklistData.steps.length;i++){

      const s = checklistData.steps[i];
      if(!s.text && !s.img && !s.audio) continue;

      html += `<div class="step">`;
      html += `<input type="checkbox" onchange="toggleStep(this)">`;
      html += `<div class="text"><b>${i+1}. ${s.text||""}</b><br>`;

      if(s.img){
        const imgName = `${basePath}-img-${i}.jpg`;
        const base64 = s.img.split(",")[1];

        await uploadFile(imgName, base64, token);
        await new Promise(r=>setTimeout(r,300));

        html += `<img src="https://sukrutaraj.github.io/checklist-pages/${imgName}"><br>`;
      }

      if(s.audio){
        const audioName = `${basePath}-audio-${i}.webm`;
        const base64 = s.audio.split(",")[1];

        await uploadFile(audioName, base64, token);
        await new Promise(r=>setTimeout(r,300));

        html += `<button onclick="new Audio('https://sukrutaraj.github.io/checklist-pages/${audioName}').play()">🔊 Spela</button>`;
      }

      html += `</div></div>`;
    }

    html += `
</div>

<div class="progress" id="progressText">0 av 0 klara</div>

<div style="text-align:center;">
<button onclick="resetChecklist()">Återställ</button>
</div>

<script>

function toggleStep(el){
  const step = el.closest('.step');
  step.classList.toggle('completed', el.checked);
  updateProgress();
}

function updateProgress(){
  const total = document.querySelectorAll('.step').length;
  const done = document.querySelectorAll('.step input:checked').length;
  document.getElementById('progressText').textContent =
    done + " av " + total + " klara";
}

function resetChecklist(){
  document.querySelectorAll('input[type="checkbox"]').forEach(chk=>chk.checked=false);
  document.querySelectorAll('.step').forEach(div=>div.classList.remove('completed'));
  updateProgress();
}

updateProgress();

<\/script>

</body>
</html>
`;

    const htmlName = `${basePath}.html`;

    await uploadFile(
      htmlName,
      btoa(unescape(encodeURIComponent(html))),
      token
    );

    const url = `https://sukrutaraj.github.io/checklist-pages/${htmlName}`;

    let copied = false;

    try{
      await navigator.clipboard.writeText(url);
      copied = true;
    }catch(e){}

    alert(
      "Länk skapad!\n\n" +
      url +
      "\n\n" +
      (copied ? "✔ Kopierad" : "⚠️ Kopiera manuellt") +
      "\n\nVänta 10–20 sek innan du öppnar."
    );

    setTimeout(()=>{
      window.open(url, "_blank");
    },15000);

  }catch(err){
    alert("Fel: " + err.message);
  }
}
  
/* ===== DATA ===== */
function updateData(){
  checklistData.title = document.getElementById("title").value;
}

/* ===== MIC ===== */
async function initMic(){
  if(!stream){
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  }
}

/* ===== RENDER ===== */
function render(){
  const container=document.getElementById("steps");
  container.innerHTML="";

  checklistData.steps.forEach((step,i)=>{

    const div=document.createElement("div");
    div.className="section step";

    div.innerHTML=`
      <b>Steg ${i+1}</b><br>

      <input value="${step.text||''}" placeholder="Beskrivning"
      oninput="checklistData.steps[${i}].text=this.value">

      <br>

      <div>
        📷 <input type="file" onchange="loadImage(event,${i})">
      </div>

      ${step.img ? `<img src="${step.img}">` : ''}

      <div>
        🔊 <input type="file" accept="audio/*" onchange="loadAudio(event,${i})">
        ${step.audio ? `<span>✔</span>` : ''}
      </div>

      <button class="smallBtn" onclick="startRec(${i})">🎤 Spela in</button>
      <button class="smallBtn" onclick="stopRec()">⏹ Stoppa</button>
      <button class="smallBtn" onclick="playRec(${i})">▶️ Lyssna</button>

      <br>

      <div>
  <button class="smallBtn" onclick="moveUp(${i})">🔼</button>
  <button class="smallBtn" onclick="moveDown(${i})">🔽</button>
  <button class="smallBtn" onclick="removeStep(${i})">🗑</button>
</div>
      
    `;

    container.appendChild(div);
  });
}

/* ===== STEG ===== */
function addStep(){
  checklistData.steps.push({text:"",img:"",audio:""});
  render();
}

function removeStep(i){
  checklistData.steps.splice(i,1);
  render();
}

function moveUp(i){
  if(i === 0) return;

  const temp = checklistData.steps[i];
  checklistData.steps[i] = checklistData.steps[i-1];
  checklistData.steps[i-1] = temp;

  render();
}

function moveDown(i){
  if(i === checklistData.steps.length - 1) return;

  const temp = checklistData.steps[i];
  checklistData.steps[i] = checklistData.steps[i+1];
  checklistData.steps[i+1] = temp;

  render();
}
  
/* ===== IMAGE (komprimering) ===== */
function loadImage(e,i){
  const file = e.target.files[0];
  if(!file) return;

  const img = new Image();
  const reader = new FileReader();

  reader.onload = function(event){
    img.onload = function(){

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const maxWidth = 600;
      let width = img.width;
      let height = img.height;

      if(width > maxWidth){
        const scale = maxWidth / width;
        width = maxWidth;
        height = height * scale;
      }

      canvas.width = width;
      canvas.height = height;

      ctx.drawImage(img, 0, 0, width, height);

      canvas.toBlob(function(blob){

        const reader2 = new FileReader();
        reader2.onload = function(){
          checklistData.steps[i].img = reader2.result;
          render();
        };

        reader2.readAsDataURL(blob);

      }, "image/jpeg", 0.6);

    };

    img.src = event.target.result;
  };

  reader.readAsDataURL(file);
}

/* ===== AUDIO ===== */
function loadAudio(e,i){
  const file=e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ()=>{
    checklistData.steps[i].audio = reader.result;
    render();
  };
  reader.readAsDataURL(file);
}

/* ===== RECORD (FIXED) ===== */
async function startRec(i){
  await initMic();
  chunks = [];

  recorder = new MediaRecorder(stream);
  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "audio/webm" });

    const reader = new FileReader();
    reader.onload = () => {
      checklistData.steps[i].audio = reader.result;
      render();
    };

    reader.readAsDataURL(blob);
  };

  recorder.start();
}

function stopRec(){
  if(recorder && recorder.state === "recording"){
    recorder.stop();
  }
}

function playRec(i){
  if(checklistData.steps[i].audio){
    new Audio(checklistData.steps[i].audio).play();
  }
}

/* ===== HTML ===== */
function downloadHTML(){

  updateData();

  let html = `<h2>${checklistData.title}</h2>`;

  checklistData.steps.forEach((s,i)=>{
    html += `<div>${s.text||""}</div>`;
  });

  download(html,"checklista.html","text/html");
}

/* ===== JSON ===== */
function exportJSON(){
  updateData();
  download(JSON.stringify(checklistData,null,2),"checklista.json","application/json");
}

function importJSON(){

  let input=document.createElement("input");
  input.type="file";

  input.onchange=e=>{
    let r=new FileReader();

    r.onload=()=>{
      try{
        const raw = JSON.parse(r.result);

        checklistData = {
          title: raw.title || "",
          steps: (raw.steps || []).map(s => ({
            text: s.text || "",
            img: s.img || "",
            audio: s.audio || ""
          }))
        };

        document.getElementById("title").value = checklistData.title;
        render();

        alert("Checklista laddad korrekt!");

      }catch{
        alert("Ogiltig JSON-fil");
      }
    };

    r.readAsText(e.target.files[0]);
  };

  input.click();
}

/* ===== PREVIEW ===== */
function generatePreview(){

  updateData();

  let html=`<h3>${checklistData.title}</h3>`;

  checklistData.steps.forEach((s,i)=>{
    if(!s.text && !s.img && !s.audio) return;

    html+=`
      <div>
        <b>Steg ${i+1}</b><br>
        ${s.text||""}<br>
        ${s.img ? `<img src="${s.img}">` : ''}
        ${s.audio ? `<button onclick="new Audio('${s.audio}').play()">▶️</button>` : ''}
      </div><br>
    `;
  });

  const preview = document.getElementById("preview");
  preview.innerHTML = html;
  preview.style.display="block";
}

/* ===== DOWNLOAD ===== */
function download(data,name,type="text/plain"){
  const blob = new Blob([data],{type});
  const url = URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download=name;

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* INIT */
addStep();

</script>

</body>
</html>
